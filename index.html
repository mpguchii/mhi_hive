<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHI Hive — Alliance Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ===== DESIGN SYSTEM: LAST WAR SURVIVAL ===== */
        :root {
            --lw-black:    #080b0e;
            --lw-dark:     #0d1117;
            --lw-panel:    #111820;
            --lw-panel2:   #161e28;
            --lw-border:   #1e2d3d;
            --lw-orange:   #e8820c;
            --lw-orange2:  #ff9d2e;
            --lw-red:      #d93025;
            --lw-red2:     #ff4433;
            --lw-green:    #27ae60;
            --lw-teal:     #1abc9c;
            --lw-blue:     #2980b9;
            --lw-gold:     #f1c40f;
            --lw-text:     #d0dce8;
            --lw-muted:    #5a7080;
            --lw-active:   #e8820c;
            --font-hud:    'Orbitron', monospace;
            --font-body:   'Rajdhani', sans-serif;
            --font-mono:   'Share Tech Mono', monospace;
            --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--lw-black);
            color: var(--lw-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== SCANLINES OVERLAY ===== */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.04) 2px,
                rgba(0,0,0,0.04) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(8,11,14,0.96);
            border-bottom: 2px solid var(--lw-orange);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            height: 52px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 30px rgba(232,130,12,0.06);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo-text {
            font-family: var(--font-hud);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #fff;
            text-transform: uppercase;
        }
        .logo-text span { color: var(--lw-orange); }

        .logo-badge {
            background: var(--lw-orange);
            color: #000;
            font-family: var(--font-hud);
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hud-btn {
            background: transparent;
            border: 1px solid var(--lw-border);
            color: var(--lw-text);
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s var(--ease-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .hud-btn:hover { border-color: var(--lw-orange); color: var(--lw-orange); background: rgba(232,130,12,0.08); }
        .hud-btn.active { border-color: var(--lw-orange); color: var(--lw-orange); background: rgba(232,130,12,0.1); }
        .hud-btn.danger { border-color: var(--lw-red); color: var(--lw-red); }
        .hud-btn.danger:hover { background: rgba(217,48,37,0.1); }
        .hud-btn svg { flex-shrink: 0; }

        /* ===== SEARCH BAR (main) ===== */
        .search-bar-wrap {
            background: rgba(8,11,14,0.9);
            border-bottom: 1px solid var(--lw-border);
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .search-label {
            font-family: var(--font-hud);
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--lw-muted);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .search-input-wrap {
            flex: 1;
            position: relative;
            max-width: 420px;
        }
        .search-input-wrap svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--lw-muted);
            pointer-events: none;
        }
        .search-input-wrap input {
            width: 100%;
            background: var(--lw-panel);
            border: 1px solid var(--lw-border);
            border-radius: 5px;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            padding: 0.45rem 0.8rem 0.45rem 2.2rem;
            transition: all 0.2s;
        }
        .search-input-wrap input::placeholder { color: var(--lw-muted); font-size: 0.8rem; }
        .search-input-wrap input:focus { outline: none; border-color: var(--lw-orange); box-shadow: 0 0 8px rgba(232,130,12,0.25); }

        .search-result-tag {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--lw-muted);
            white-space: nowrap;
        }
        .search-result-tag span { color: var(--lw-orange); font-weight: 700; }

        /* ===== MAIN LAYOUT ===== */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 0;
            min-height: calc(100vh - 52px - 46px);
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .right-panel { order: -1; border-left: none; border-bottom: 1px solid var(--lw-border); }
        }

        /* ===== GRID PANEL ===== */
        .grid-panel {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .grid-header {
            width: 100%;
            max-width: 640px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-label {
            font-family: var(--font-hud);
            font-size: 0.6rem;
            letter-spacing: 2.5px;
            color: var(--lw-muted);
            text-transform: uppercase;
        }

        .grid-stats-row {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .stat-chip {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--lw-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-chip b { color: var(--lw-orange); font-weight: 700; }

        /* ===== MATRIX GRID ===== */
        .matrix-wrap {
            width: 100%;
            max-width: 640px;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 5px;
            width: 100%;
            aspect-ratio: 9 / 11;
        }

        @media (max-width: 600px) {
            .matrix-grid { gap: 2px; }
            .grid-panel { padding: 0.5rem; }
            .matrix-wrap { max-width: 100%; }
        }
        @media (max-width: 400px) {
            .matrix-grid { gap: 1px; }
            .grid-panel { padding: 0.3rem; }
        }

        /* ===== CELLS ===== */
        .cell {
            aspect-ratio: 1;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s var(--ease-smooth);
            position: relative;
            overflow: hidden;
        }

        .cell.inactive {
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.04);
            cursor: default;
            opacity: 0.3;
        }

        .cell.active {
            background: var(--lw-panel);
            border: 1px solid var(--lw-border);
        }

        }

        .cell.active:hover .cell-bg,
        .cell.highlighted-cell .cell-bg {
            opacity: 0.9;
            filter: grayscale(0%) brightness(1.15);
        }

        .cell.active:hover {
            border-color: var(--lw-orange);
            box-shadow: 0 0 12px rgba(232,130,12,0.5), inset 0 0 8px rgba(232,130,12,0.08);
            transform: scale(1.06);
            z-index: 5;
        }

        .cell.highlighted-cell {
            border-color: #fff !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.6) !important;
            transform: scale(1.1) !important;
            z-index: 10 !important;
        }

        @keyframes pulse-center {
            0%, 100% { box-shadow: 0 0 10px rgba(217,48,37,0.35); }
            50%       { box-shadow: 0 0 22px rgba(217,48,37,0.65), inset 0 0 10px rgba(217,48,37,0.15); }
        }

        /* Search highlight state */
        .cell.search-match {
            border-color: var(--lw-gold) !important;
            box-shadow: 0 0 18px rgba(241,196,15,0.6) !important;
            transform: scale(1.1) !important;
            z-index: 8 !important;
            animation: search-pulse 1.2s ease-in-out infinite;
        }
        .cell.search-match .cell-bg { opacity: 1 !important; filter: none !important; }

        @keyframes search-pulse {
            0%,100% { box-shadow: 0 0 14px rgba(241,196,15,0.5); }
            50%      { box-shadow: 0 0 28px rgba(241,196,15,0.9); }
        }

        /* Cell overlays */
        .cell-name-badge {
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            background: rgba(8,11,14,0.88);
            color: var(--lw-orange2);
            font-family: var(--font-body);
            font-size: 0.62rem;
            font-weight: 700;
            padding: 1px 3px;
            border-radius: 3px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            z-index: 3;
            border-bottom: 0.5px solid rgba(232,130,12,0.3);
            line-height: 1.3;
        }

        .cell-stats-badge {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            background: rgba(8,11,14,0.92);
            color: var(--lw-teal);
            font-family: var(--font-mono);
            font-size: 0.55rem;
            font-weight: 700;
            padding: 1px 3px;
            border-radius: 3px;
            text-align: center;
            pointer-events: none;
            z-index: 3;
            border-top: 0.5px solid rgba(26,188,156,0.3);
            line-height: 1.3;
        }
        .cell-level-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8,11,14,0.85);
            color: var(--lw-gold);
            font-family: var(--font-hud);
            font-size: 0.72rem;
            font-weight: 800;
            width: 20px;
            height: 20px;
            line-height: 19px;
            text-align: center;
            border-radius: 50%;
            border: 1px solid rgba(241,196,15,0.4);
            box-shadow: 0 0 6px rgba(241,196,15,0.3);
            pointer-events: none;
            z-index: 3;
        }

        @media (max-width: 768px) {
            .cell-name-badge { font-size: 0.5rem; padding: 1px 2px; }
            .cell-stats-badge { font-size: 0.44rem; }
            .cell-level-badge { font-size: 0.58rem; width: 16px; height: 16px; line-height: 15px; }
        }
        @media (max-width: 480px) {
            .cell-name-badge { font-size: 0.38rem; padding: 0 1px; top: 1px; left: 1px; right: 1px; line-height: 1.1; }
            .cell-stats-badge { font-size: 0.35rem; padding: 0 1px; bottom: 1px; left: 1px; right: 1px; line-height: 1.1; }
        }
        @media (max-width: 360px) {
            .cell-name-badge { font-size: 0.3rem; }
            .cell-stats-badge { font-size: 0.28rem; }
        }

        /* ===== RIGHT PANEL ===== */
        .right-panel {
            border-left: 1px solid var(--lw-border);
            background: var(--lw-dark);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 52px - 46px);
            position: sticky;
            top: calc(52px + 46px);
            overflow: hidden;
        }

        @media (max-width: 900px) {
            .right-panel {
                height: auto;
                position: static;
            }
        }

        /* Panel tabs */
        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--lw-border);
        }
        .panel-tab {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--lw-muted);
            font-family: var(--font-hud);
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: -1px;
        }
        .panel-tab.active {
            color: var(--lw-orange);
            border-bottom-color: var(--lw-orange);
        }
        .panel-tab:hover:not(.active) { color: var(--lw-text); }

        /* Radar focus card */
        .radar-panel {
            padding: 0.8rem;
            flex-shrink: 0;
        }
        .radar-card {
            background: var(--lw-panel);
            border: 1px solid var(--lw-border);
            border-radius: 6px;
            padding: 0.8rem;
            min-height: 160px;
        }
        .radar-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.7rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--lw-border);
        }
        .radar-title {
            font-family: var(--font-hud);
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--lw-text);
            text-transform: uppercase;
        }
        .coord-badge {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--lw-teal);
            background: rgba(26,188,156,0.1);
            border: 1px solid rgba(26,188,156,0.2);
            padding: 2px 7px;
            border-radius: 3px;
        }
        .focus-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.82rem;
        }
        .focus-row:last-child { border-bottom: none; }
        .focus-label { color: var(--lw-muted); font-weight: 500; }
        .focus-val { color: var(--lw-text); font-weight: 600; font-family: var(--font-mono); font-size: 0.78rem; }
        .focus-empty {
            color: var(--lw-muted);
            font-size: 0.78rem;
            text-align: center;
            padding: 2rem 0;
            font-family: var(--font-mono);
        }

        /* Rank badge colors */

    let currentGridMap = [];

    // ===== DOM REFS =====
    const gridEl          = document.getElementById('grid');
    const listEl          = document.getElementById('member-list-items');
    const focusTitle      = document.getElementById('focus-title');
    const focusCoord      = document.getElementById('focus-coord');
    const focusBody       = document.getElementById('focus-body');
    const mainSearch      = document.getElementById('main-search');
    const searchResultTag = document.getElementById('search-result-tag');
    const statDeployed    = document.getElementById('stat-deployed');
    const statReserve     = document.getElementById('stat-reserve');
    const inputNick       = document.getElementById('input-nick');
    const inputPower      = document.getElementById('input-power');
    const inputLevel      = document.getElementById('input-level');
    const btnAdd          = document.getElementById('btn-add-member');
    const sidebarOverlay  = document.getElementById('sidebar-overlay');
    const rightPanel      = document.getElementById('right-panel');

    // ===== TAB SWITCHING =====
    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-focus').classList.toggle('active', tab === 'focus');
        document.getElementById('tab-roster').classList.toggle('active', tab === 'roster');
        const focusPane = document.getElementById('pane-focus');
        const rosterPane = document.getElementById('pane-roster');
        if (tab === 'focus') {
            focusPane.style.display = '';
            rosterPane.style.display = 'none';
        } else {
            focusPane.style.display = 'none';
            rosterPane.style.cssText = 'display:flex; flex-direction:column; flex:1; overflow:hidden;';
            renderMemberList();
        }
    }

    // ===== MOBILE SIDEBAR =====
    const btnToggle = document.getElementById('btn-toggle-sidebar');
    if (btnToggle) {
        btnToggle.addEventListener('click', () => {
            rightPanel.style.display = rightPanel.style.display === 'flex' ? 'none' : 'flex';
        });
    }
    sidebarOverlay.addEventListener('click', () => {
        rightPanel.style.display = 'none';
        sidebarOverlay.classList.remove('active');
    });

    // ===== SCORING =====
    function parsePower(s) {
        const v = parseFloat(s.toString().replace(/[^\d.]/g, ''));
        return isNaN(v) ? 0 : v;
    }
    function getScore(m) {
        return parseInt(m.level) * 1000 + parsePower(m.power);
    }
    function getSorted() {
        return [...members].sort((a, b) => getScore(b) - getScore(a));
    }

    // ===== INIT CELL POSITIONS (concentric order) =====
    function initCellPositions() {
        sortedCellPositions = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (r === CENTER_ROW && c === CENTER_COL) continue;
                const dx = c - CENTER_COL, dy = r - CENTER_ROW;
                sortedCellPositions.push({ r, c, dist: Math.sqrt(dx*dx + dy*dy) });
            }
        }
        sortedCellPositions.sort((a, b) => a.dist - b.dist);
    }

    // ===== SAVE =====
    function saveMembers() {
        localStorage.setItem('alliance_members', JSON.stringify(members));
    }

    // ===== SEARCH HIGHLIGHT =====
    function applySearchHighlight(query) {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('search-match'));
        if (!query) {
            searchResultTag.innerHTML = '';
            clearFocusDetails();
            return;
        }
        const sorted = getSorted();
        const idx = sorted.findIndex(m => m.nickname.toLowerCase().includes(query.toLowerCase()));
        if (idx === -1) {
            searchResultTag.innerHTML = 'Not found';
            return;
        }
        const member = sorted[idx];
        if (idx < sortedCellPositions.length) {
            const pos = sortedCellPositions[idx];
            const cellEl = document.getElementById(`cell-${pos.r}-${pos.c}`);
            if (cellEl) {
                cellEl.classList.add('search-match');
                const coords = getCellCoordinates(pos.r, pos.c);
                searchResultTag.innerHTML = `<span>${member.nickname}</span> → X:${coords.x} Y:${coords.y}`;
                showMemberDetails({ ...member, rank: idx + 1, dist: pos.dist }, pos.r, pos.c, true);
            }
        } else {
            searchResultTag.innerHTML = `<span>${member.nickname}</span> → Reserve`;
        }
    }

    mainSearch.addEventListener('input', () => applySearchHighlight(mainSearch.value.trim()));

    // ===== RENDER GRID =====
    function renderGrid() {
        gridEl.innerHTML = '';
        currentGridMap = Array.from({length: ROWS}, () => Array(COLS).fill(null));

        const sorted = getSorted();
        sortedCellPositions.forEach((pos, i) => {
            if (i < sorted.length) {
                currentGridMap[pos.r][pos.c] = { ...sorted[i], rank: i+1, dist: pos.dist };
            }
        });

        let deployed = 0, reserve = 0;
        sorted.forEach((m, i) => { i < sortedCellPositions.length ? deployed++ : reserve++; });
        statDeployed.textContent = deployed;
        statReserve.textContent  = reserve;

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');

                if (r === CENTER_ROW && c === CENTER_COL) {
                    cell.classList.add('vacant');
                    const bg = document.createElement('div');
                    bg.classList.add('cell-bg');
                    cell.appendChild(bg);
                    cell.title = 'MG (Reserved)';
                    cell.addEventListener('mouseenter', () => showCenterDetails(r, c));
                    cell.addEventListener('mouseleave', clearFocusDetails);
                } else {
                    const member = currentGridMap[r][c];
                    if (member) {
                        cell.classList.add('active');
                        cell.id = `cell-${r}-${c}`;

                        const bg = document.createElement('div');
                        bg.classList.add('cell-bg');
                        cell.appendChild(bg);

                        const name = document.createElement('span');
                        name.classList.add('cell-name-badge');
                        name.textContent = member.nickname;
                        cell.appendChild(name);

                        const coords = getCellCoordinates(r, c);
                        const stats = document.createElement('span');
                        stats.classList.add('cell-stats-badge');
                        stats.textContent = `${coords.x},${coords.y}`;
                        cell.appendChild(stats);

                        const lvl = document.createElement('span');
                        lvl.classList.add('cell-level-badge');
                        lvl.textContent = member.level;
                        cell.appendChild(lvl);

                        cell.addEventListener('mouseenter', () => {
                            showMemberDetails(member, r, c, false);
                            highlightCard(member.nickname);
                        });
                        cell.addEventListener('mouseleave', () => {
                            clearFocusDetails();
                            clearCardHighlights();
                        });
                    } else {
                        cell.classList.add('inactive');
                        cell.addEventListener('mouseenter', () => showInactiveDetails(r, c));
                        cell.addEventListener('mouseleave', clearFocusDetails);
                    }
                }

                gridEl.appendChild(cell);
            }
        }

        // Re-apply search highlight after re-render
        if (mainSearch.value.trim()) applySearchHighlight(mainSearch.value.trim());
    }

    // ===== RENDER MEMBER LIST =====
    function renderMemberList() {
        listEl.innerHTML = '';
        const sorted = getSorted();
        sorted.forEach((member, index) => {
            const inGrid = index < sortedCellPositions.length;
            const pos = inGrid ? sortedCellPositions[index] : null;
            const coords = pos ? getCellCoordinates(pos.r, pos.c) : null;

            const card = document.createElement('div');
            card.classList.add('member-card');
            if (!inGrid) card.classList.add('reserve-card');
            card.id = `member-card-${encodeURIComponent(member.nickname)}`;

            const rankColor = index === 0 ? 'rank-gold' : index === 1 ? 'rank-silver' : index === 2 ? 'rank-bronze' : 'rank-normal';

            card.innerHTML = `
                <span class="member-rank-num ${rankColor}">#${index+1}</span>
                <div class="member-info">
                    <div class="member-name" title="${member.nickname}">${member.nickname}</div>
                    <div class="member-meta">Lv <b>${member.level}</b> · ${member.power}</div>
                </div>
                <span class="pos-tag ${inGrid ? 'grid-pos' : 'reserve'}">${coords ? `${coords.x},${coords.y}` : 'RES'}</span>
                <div class="member-actions">
                    <button class="btn-icon edit" title="Edit Power">✏️</button>
                    <button class="btn-icon del" title="Remove">×</button>
                </div>
            `;

            // Hover: highlight grid cell
            card.addEventListener('mouseenter', () => {
                if (pos) {
                    const cellEl = document.getElementById(`cell-${pos.r}-${pos.c}`);
                    if (cellEl) cellEl.classList.add('highlighted-cell');
                    showMemberDetails({ ...member, rank: index+1, dist: pos.dist }, pos.r, pos.c, true);
                }
            });
            card.addEventListener('mouseleave', () => {
                document.querySelectorAll('.cell.highlighted-cell').forEach(c => c.classList.remove('highlighted-cell'));
                clearFocusDetails();
            });

            card.querySelector('.edit').addEventListener('click', e => {
                e.stopPropagation();
                const newPow = prompt(`Update Power for ${member.nickname}:`, member.power);
                if (newPow !== null && newPow.trim()) {
                    let p = newPow.trim().toUpperCase();
                    if (!p.endsWith('M') && !isNaN(parseFloat(p))) p += 'M';
                    const idx = members.findIndex(m => m.nickname === member.nickname);
                    if (idx !== -1) { members[idx].power = p; saveMembers(); recalculate(); }
                }
            });

            card.querySelector('.del').addEventListener('click', e => {
                e.stopPropagation();
                if (confirm(`Remove ${member.nickname} from the roster?`)) {
                    members = members.filter(m => m.nickname !== member.nickname);
                    saveMembers(); recalculate();
                }
            });

            listEl.appendChild(card);
        });
    }

    // ===== ADD MEMBER =====
    btnAdd.addEventListener('click', () => {
        const nick = inputNick.value.trim();
        const power = inputPower.value.trim();
        const lvl = inputLevel.value.trim();
        if (!nick || !power || !lvl) { alert('Fill in all fields.'); return; }
        if (members.some(m => m.nickname.toLowerCase() === nick.toLowerCase())) { alert('Member already exists.'); return; }
        let p = power.toUpperCase();
        if (!p.endsWith('M') && !isNaN(parseFloat(p))) p += 'M';
        members.push({ nickname: nick, power: p, level: lvl });
        saveMembers(); recalculate();
        inputNick.value = ''; inputPower.value = ''; inputLevel.value = '';
    });

    // ===== FOCUS DETAILS =====
    function rankColor(rank) {
        if (rank === 1) return '#f1c40f';
        if (rank === 2) return '#c0c0c0';
        if (rank === 3) return '#cd7f32';
        return 'var(--lw-orange2)';
    }

    function showMemberDetails(member, r, c, fromSearch) {
        if (!fromSearch) switchToFocusTab();
        const coords = getCellCoordinates(r, c);
        focusTitle.textContent = 'Member Detected';
        focusTitle.style.color = 'var(--lw-orange)';
        focusCoord.textContent = `X:${coords.x} Y:${coords.y}`;
        focusBody.innerHTML = `
            <div class="focus-row">
                <span class="focus-label">Nickname</span>
                <span class="focus-val" style="color:#fff;font-size:0.85rem;">${member.nickname}</span>
            </div>
            <div class="focus-row">
                <span class="focus-label">Alliance Rank</span>
                <span class="focus-val" style="color:${rankColor(member.rank)};">#${member.rank}</span>
            </div>
            <div class="focus-row">
                <span class="focus-label">Base Level</span>
                <span class="focus-val" style="color:var(--lw-teal);">Lv ${member.level}</span>
            </div>
            <div class="focus-row">
                <span class="focus-label">Power</span>
                <span class="focus-val" style="color:var(--lw-orange2);">${member.power}</span>
            </div>
            <div class="focus-row">
                <span class="focus-label">Dist. to Center</span>
                <span class="focus-val">${member.dist.toFixed(2)} u</span>
            </div>
        `;
    }

    function switchToFocusTab() {
        if (currentTab !== 'focus') switchTab('focus');
    }

    function showCenterDetails(r, c) {
        const coords = getCellCoordinates(r, c);
        focusTitle.textContent = 'Command Center';
        focusTitle.style.color = 'var(--lw-red2)';
        focusCoord.textContent = `X:${coords.x} Y:${coords.y}`;
        focusBody.innerHTML = `
            <div style="text-align:center;padding:1.2rem 0;">
                <div style="color:var(--lw-red2);font-family:var(--font-hud);font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:0.5rem;">Event Reserved</div>
                <div style="color:var(--lw-muted);font-size:0.78rem;line-height:1.5;">This cell is reserved for the<br>Alliance Event anchor point.</div>
            </div>
        `;
    }

    function showInactiveDetails(r, c) {
        const coords = getCellCoordinates(r, c);
        focusTitle.textContent = 'Empty Cell';
        focusTitle.style.color = 'var(--lw-muted)';
        focusCoord.textContent = `X:${coords.x} Y:${coords.y}`;
        focusBody.innerHTML = `<div class="focus-empty">No member assigned</div>`;
    }

    function clearFocusDetails() {
        if (mainSearch.value.trim()) return; // Keep details if search is active
        focusTitle.textContent = 'Radar Focus';
        focusTitle.style.color = 'var(--lw-text)';
        focusCoord.textContent = '—';
        focusBody.innerHTML = '<div class="focus-empty">Hover over a cell<br>or search your nickname</div>';
    }

    // ===== HIGHLIGHTS =====
    function highlightCard(nickname) {
        const card = document.getElementById('member-card-' + encodeURIComponent(nickname));
        if (card) {
            card.classList.add('highlighted');
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }
    function clearCardHighlights() {
        document.querySelectorAll('.member-card.highlighted').forEach(c => c.classList.remove('highlighted'));
    }

    // ===== RECALCULATE =====
    function recalculate() {
        renderGrid();
        if (currentTab === 'roster') renderMemberList();
    }

    // ===== EXPORT IMAGE =====
    function doExport() {
        const btn = document.getElementById('btn-export-image');
        const btn2 = document.getElementById('btn-export-sidebar');
        [btn, btn2].forEach(b => { if(b){b.disabled=true; b.textContent='Generating...';} });

        // Build a self-contained export element
        const target = document.getElementById('export-target');
        target.style.display = 'block';

        const sorted = getSorted();
        const top30 = sorted.slice(0, 30);

        // Build grid HTML
        let gridHtml = '';
        const gridMap = Array.from({length: ROWS}, () => Array(COLS).fill(null));
        sortedCellPositions.forEach((pos, i) => {
            if (i < sorted.length) gridMap[pos.r][pos.c] = { ...sorted[i], rank: i+1 };
        });

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const isCenter = r === CENTER_ROW && c === CENTER_COL;
                if (isCenter) {
                    gridHtml += `<div class="export-cell vacant"><div class="cell-bg" style="background-image:url('${CENTER_URI}');background-size:cover;background-position:center;opacity:0.85;position:absolute;inset:0;"></div></div>`;
                } else {
                    const m = gridMap[r][c];
                    if (m) {
                        const coords = getCellCoordinates(r, c);
                        gridHtml += `<div class="export-cell active">
                            <div class="cell-bg" style="background-image:url('${CELL_URI}');background-size:cover;background-position:center;opacity:0.6;position:absolute;inset:0;border-radius:4px;"></div>
                            <div class="cell-name" style="position:absolute;top:2px;left:2px;right:2px;background:rgba(8,11,14,0.9);color:#ff9d2e;font-size:7px;font-weight:700;padding:1px 2px;border-radius:2px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:3;">${m.nickname}</div>
                            <div class="cell-coord" style="position:absolute;bottom:2px;left:2px;right:2px;background:rgba(8,11,14,0.92);color:#1abc9c;font-family:monospace;font-size:6px;padding:1px 2px;border-radius:2px;text-align:center;z-index:3;">${coords.x},${coords.y}</div>
                            <div class="cell-level" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(8,11,14,0.85);color:#f1c40f;font-family:sans-serif;font-size:0.68rem;font-weight:800;width:18px;height:18px;line-height:17px;border-radius:50%;border:1px solid rgba(241,196,15,0.4);box-shadow:0 0 6px rgba(241,196,15,0.3);text-align:center;z-index:3;">${m.level}</div>
                        </div>`;
                    } else {
                        gridHtml += `<div class="export-cell inactive"></div>`;
                    }
                }
            }
        }

        // Build member list HTML (top 30)
        let listHtml = '';
        top30.forEach((m, i) => {
            const col = i === 0 ? '#f1c40f' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#e8820c';
            listHtml += `<div style="background:#111820;border:1px solid #1e2d3d;border-radius:4px;padding:4px 6px;display:flex;align-items:center;gap:6px;font-size:0.72rem;margin-bottom:3px;">
                <span style="font-family:monospace;font-size:0.6rem;color:${col};min-width:22px;">#${i+1}</span>
                <span style="flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;">${m.nickname}</span>
                <span style="font-family:monospace;color:#1abc9c;font-size:0.65rem;white-space:nowrap;">${m.power}</span>
            </div>`;
        });

        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB') + ' ' + now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});

        target.innerHTML = `
        <div style="font-family:'Rajdhani','Segoe UI',sans-serif;background:#080b0e;color:#d0dce8;padding:20px;width:900px;">
            <div style="display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #e8820c;padding-bottom:12px;margin-bottom:16px;">
                <div>
                    <div style="font-family:monospace;font-size:1.3rem;font-weight:900;letter-spacing:3px;color:#fff;">MHI <span style="color:#e8820c;">HIVE</span></div>
                    <div style="font-size:0.72rem;color:#5a7080;margin-top:2px;font-family:monospace;">ALLIANCE TACTICAL GRID</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-family:monospace;font-size:0.7rem;color:#5a7080;">GENERATED: ${dateStr}</div>
                    <div style="font-family:monospace;font-size:0.7rem;color:#e8820c;margin-top:2px;">MEMBERS: ${members.length} · DEPLOYED: ${Math.min(members.length, sortedCellPositions.length)}</div>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 240px;gap:20px;">
                <div>
                    <div style="font-family:monospace;font-size:0.55rem;letter-spacing:2px;color:#5a7080;text-transform:uppercase;margin-bottom:8px;">Tactical Grid 9×11 — Concentric Allocation</div>
                    <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:4px;aspect-ratio:9/11;">
                        ${gridHtml}
                    </div>
                </div>
                <div>
                    <div style="font-family:monospace;font-size:0.55rem;letter-spacing:2px;color:#5a7080;text-transform:uppercase;margin-bottom:8px;">Top 30 Members — By Score</div>
                    ${listHtml}
                </div>
            </div>
            <div style="margin-top:14px;border-top:1px solid #1e2d3d;padding-top:10px;font-family:monospace;font-size:0.6rem;color:#2d4052;text-align:center;letter-spacing:1px;">
                MHI HIVE ALLIANCE GRID — LAST WAR: SURVIVAL
            </div>
        </div>`;

        html2canvas(target, {
            backgroundColor: '#080b0e',
            scale: 2,
            logging: false,
            useCORS: true,
            allowTaint: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'mhi_hive_grid.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            target.style.display = 'none';
            [btn, btn2].forEach(b => {
                if(b){b.disabled=false; b.textContent=b.id==='btn-export-image'?'Export':'Export Grid Image';}
            });
        }).catch(err => {
            console.error(err);
            alert('Export failed.');
            target.style.display = 'none';
            [btn, btn2].forEach(b => { if(b){b.disabled=false;} });
        });
    }

    document.getElementById('btn-export-image').addEventListener('click', doExport);
    document.getElementById('btn-export-sidebar').addEventListener('click', doExport);

    // ===== INIT =====
    initCellPositions();
    recalculate();
</script>
</body>
</html>
